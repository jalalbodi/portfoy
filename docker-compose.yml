services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-nextjs:local
    container_name: portfolio-nextjs
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT:-your.email@example.com}
      CONTACT_WEBHOOK_URL: ${CONTACT_WEBHOOK_URL:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
