name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  devsecops-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: portfolio-security:${{ github.sha }}

      - name: Trivy Docker image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: portfolio-security:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
